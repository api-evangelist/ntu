  - date: '2026-06-03'
    rating: 3
    summary: >-
      NTU's confirmed public API footprint is centered on its library and research
      infrastructure. DR-NTU (Data) runs Dataverse 6.1 with a live, documented HTTP
      API (verified /api/info/version and /api/search returning 200). DR-NTU
      (Digital Repository) runs DSpace 7.6.3 with DSpace-CRIS, exposing a live REST
      API at /server/api (200) and an OAI-PMH endpoint (Identify verb returned 200).
      The official NTUsg GitHub org exists but has no public repositories. No
      publicly documented course/timetable/SIS or mobile-backend APIs were found.
      All endpoints below were probed live; nothing was fabricated.
    endpoints:
      - url: https://researchdata.ntu.edu.sg/
        status: 200
        note: DR-NTU (Data) Dataverse portal, live.
