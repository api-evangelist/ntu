---
aid: ntu
name: Nanyang Technological University
description: >-
  Nanyang Technological University (NTU Singapore) is a public research university
  in Singapore and is ranked #15 in the QS World University Rankings 2025. NTU's
  public, machine-readable footprint is concentrated in its library and research
  infrastructure: DR-NTU (Data), a Dataverse-based open research data repository,
  exposes a documented HTTP API, and DR-NTU (Digital Repository of NTU), a DSpace
  7 / DSpace-CRIS institutional repository, exposes a REST API and an OAI-PMH
  endpoint. Other institutional systems (student information, timetabling, mobile
  app backends, SSO) are present but not publicly documented as open APIs.
