apis:
  - aid: ntu:drntu-data
    name: DR-NTU (Data) Dataverse API
    description: >-
      DR-NTU (Data) is NTU's institutional open-access research data repository,
      built on the open-source Dataverse software (version 6.1). It exposes the
      standard Dataverse HTTP API for discovering, searching, and downloading
      published datasets, including the search API and dataset/file access
      endpoints. Use is governed by the DR-NTU (Data) API Terms of Use.
    humanURL: https://libguides.ntu.edu.sg/drntudataguidespolicies/APITermsOfUse
    baseURL: https://researchdata.ntu.edu.sg/api
    tags: [ Research Data, Open Data, Dataverse, Repository ]
    properties:
      - type: Documentation
        url: https://libguides.ntu.edu.sg/drntudataguidespolicies/APITermsOfUse
      - type: Documentation
        url: https://guides.dataverse.org/en/latest/api/
      - type: Website
        url: https://researchdata.ntu.edu.sg/
      - type: OpenAPI
        url: openapi/ntu-drntu-data.yaml
      - type: x-json-schema
        url: json-schema/ntu-dataset-schema.json
      - type: x-example
        url: examples/ntu-search-example.json
  - aid: ntu:drntu-repo-rest
    name: DR-NTU (Digital Repository) DSpace REST API
    description: >-
      DR-NTU (Digital Repository of NTU) is NTU's institutional repository for
      scholarly output, running DSpace 7.6.3 with DSpace-CRIS. It exposes the
      DSpace 7 HAL-based REST API at /server/api for programmatic discovery and
      retrieval of communities, collections, items, and bitstreams.
    humanURL: https://dr.ntu.edu.sg/home
    baseURL: https://dr.ntu.edu.sg/server/api
    tags: [ Repository, DSpace, Scholarly, Library ]
    properties:
      - type: Documentation
        url: https://dr.ntu.edu.sg/home
      - type: Documentation
        url: https://wiki.lyrasis.org/display/DSDOC7x/REST+API
      - type: OpenAPI
        url: openapi/ntu-drntu-repo-rest.yaml
      - type: x-json-schema
        url: json-schema/ntu-item-schema.json
      - type: x-example
        url: examples/ntu-discover-example.json
  - aid: ntu:drntu-repo-oai
    name: DR-NTU (Digital Repository) OAI-PMH
    description: >-
      DR-NTU (Digital Repository of NTU) provides an OAI-PMH 2.0 endpoint for
      harvesting metadata records from the DSpace-based institutional repository,
      supporting standard verbs such as Identify, ListRecords, and ListMetadataFormats.
    humanURL: https://dr.ntu.edu.sg/home
    baseURL: https://dr.ntu.edu.sg/oai/request
    tags: [ Repository, OAI-PMH, Metadata, Harvesting, Library ]
    properties:
      - type: Documentation
        url: https://dr.ntu.edu.sg/home
      - type: Documentation
        url: https://www.openarchives.org/OAI/openarchivesprotocol.html
      - type: OpenAPI
        url: openapi/ntu-drntu-repo-oai.yaml
